# ===========================================================
#  전략 / 백테스트 / 운영 파라미터
#  코드를 건드리지 않고 여기서 동작을 조정합니다.
# ===========================================================

universe:
  markets: ["KOSPI", "KOSDAQ"]   # 대상 시장
  min_market_cap: 100000000000   # 최소 시가총액 1,000억 (소형주/관리종목 필터)
  min_avg_value: 1000000000      # 최소 20일 평균 거래대금 10억 (유동성 필터)
  exclude_etf: true              # ETF/ETN 제외
  # 거래대금 상위 N개로 후보 제한 — 거래없는 동전주/우선주가 '저변동성'으로
  # 잘못 선택되는 것을 차단(이 필터가 없으면 전략이 죽은 종목만 골라 수평선이 됨).
  top_n_liquid: 500

strategy:
  # ===== 한국형 멀티팩터 (가격 모멘텀에서 피벗) =====
  # 한국 시장 실증상 강건한 프리미엄: 가치(Value)·저변동성·사이즈 + 한국특화 수급.
  # 단순 가격 모멘텀/수익성 단독은 약해 코어에서 제외(Quality는 보조만).
  name: "korea_multifactor"
  rebalance: "monthly"           # 가치·사이즈는 느린 팩터 → 월별 (비용·노이즈↓)
  holding: 20                    # 보유 종목 수 (가치전략은 분산이 유리)
  # --- 팩터 가중치 (가용 팩터만 자동 재정규화) ---
  factor_weights:
    value: 0.30                  # 저PER·저PBR·고배당 [핵심] (펀더멘털 패널)
    low_volatility: 0.25         # 저변동성 [핵심] (가격에서 직접 계산)
    size: 0.20                   # 소형주 우위 [핵심] (시총 패널)
    supply_demand: 0.15          # 외국인+기관 순매수 [한국 특화] (수급 패널)
    quality: 0.10                # ROE 프록시 [보조] (단독효과 약함 → 소폭)
  # --- 회전율 억제: 버퍼존 ---
  buffer_zone: 1.3               # 보유종목이 상위 26위 안이면 유지 → 월 회전율↓
  vol_window: 120                # 저변동성 산출 기간(영업일)
  # 가치전략은 이동평균 아래 종목도 매수하므로 200일선 강제필터 끔(0).
  # 약세장 방어는 risk.market_regime_filter 에 위임.
  ma_filter: 0

risk:
  max_weight_per_stock: 0.08     # 종목당 최대 비중 8% (20종목 분산)
  use_vol_targeting: true        # 변동성 타게팅(레버리지 없음, gross<=1)
  target_portfolio_vol: 0.16     # 저변동성 코어에 맞춘 목표변동성
  stop_loss: -0.15               # 가치주는 변동성↑ → 손절 폭 완화(조기 손절 방지)
  take_profit: 0.60              # 승자 유지, 청산은 월 리밸런싱 랭킹에 위임
  market_regime_filter: true     # 코스피 200일선 아래면 익스포저 축소(약세장 방어)
  regime_exposure: 0.7           # 약세장 잔여 익스포저 70%
  cash_buffer: 0.03

execution:
  order_type: "limit"            # limit | market
  limit_slippage: 0.003          # 지정가 슬리피지 허용 0.3%
  max_order_per_run: 30          # 1회 실행당 최대 주문 수 (API rate 보호)
  # 월별 리밸런싱이라 회전율 상한은 보수적으로. (꺾인 종목 교체 + 비용 균형)
  turnover_limit: 0.3

costs:
  commission: 0.00015            # 매매수수료 0.015% (모의/실전 유사)
  tax: 0.0018                    # 매도세 0.18% (2025 기준, 매도 시에만)
  slippage: 0.001                # 백테스트 가정 슬리피지 0.1%

backtest:
  start: "2018-01-01"
  end: "2024-12-31"
  initial_cash: 10000000         # 1,000만원
  benchmark: "KOSPI"             # 시장 대비 초과수익 비교 기준

# ----- 장중 자동 실행(run_live) 설정 -----
live:
  timezone: "Asia/Seoul"
  market_open: "09:00"           # 정규장 시작
  market_close: "15:20"          # 이 시각 이후엔 신규 진입 중단(동시호가 회피)
  rebalance_at: "09:05"          # 하루 1회 전체 리밸런싱 시각
  risk_check_interval_min: 5     # 장중 손절/익절 점검 주기(분)
  update_data_before_rebalance: false  # true 면 리밸런싱 전 일봉 캐시 증분 갱신(느림)
